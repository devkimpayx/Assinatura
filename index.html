<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Assinatura — Calculadora de Vencimentos</title>
<meta name="theme-color" content="#764ba2">
<meta name="color-scheme" content="dark">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="mobile-web-app-capable" content="yes">
<meta name="description" content="Calculadora de vencimentos de assinaturas com design glassmorphism">
<link rel="manifest" href='data:application/manifest+json,{"name":"Assinatura","short_name":"Assinatura","start_url":".","display":"standalone","background_color":"#764ba2","theme_color":"#764ba2","description":"Calculadora de vencimentos"}'>

<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html, body { height:100%; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Inter, Ubuntu, sans-serif;
    color:#fff;
    background:#1a1030;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:16px;
    min-height:100dvh;
    overflow-x:hidden;
  }
  .bg {
    position:fixed; inset:0; z-index:-1;
    background: linear-gradient(-45deg, #667eea, #8e54e9, #764ba2, #6b5ce7, #667eea);
    background-size:400% 400%;
    animation: gradient 18s ease infinite;
  }
  .bg::after {
    content:"";
    position:absolute; inset:0;
    background: radial-gradient(600px circle at 20% 20%, rgba(255,255,255,0.15), transparent 40%),
                radial-gradient(800px circle at 80% 80%, rgba(255,255,255,0.1), transparent 40%);
  }
  @keyframes gradient { 0%{background-position:0% 50%} 50%{background-position:100% 50%} 100%{background-position:0% 50%} }

  .container { width:100%; max-width:520px; }
  .card {
    width:100%;
    background: rgba(255,255,255,0.12);
    -webkit-backdrop-filter: blur(24px);
    backdrop-filter: blur(24px);
    border:1px solid rgba(255,255,255,0.2);
    border-radius:28px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.35), inset 0 1px 0 rgba(255,255,255,0.15);
    padding:24px;
    animation: cardIn .6s ease;
  }
  @keyframes cardIn { from { opacity:0; transform:translateY(16px) } to { opacity:1; transform:translateY(0) } }

  header { text-align:center; margin-bottom:22px; }
  h1 { font-size:32px; font-weight:800; letter-spacing:-0.5px; }
  .subtitle { margin-top:4px; font-size:15px; opacity:.8; }

  .field { margin-bottom:16px; }
  label { display:block; font-size:13px; font-weight:600; opacity:.85; margin:0 4px 8px; text-transform:uppercase; letter-spacing:.5px; }
  input[type="text"], input[type="date"], select, button {
    width:100%; min-height:56px; border-radius:16px; border:1px solid rgba(255,255,255,0.22);
    background: rgba(255,255,255,0.08); color:#fff; font-size:18px; padding:0 18px;
    outline:none; transition: all .3s ease;
  }
  input::placeholder { color: rgba(255,255,255,0.55); }
  input:focus, select:focus { border-color: rgba(255,255,255,0.45); box-shadow:0 0 0 4px rgba(255,255,255,0.1); background: rgba(255,255,255,0.12); }
  input[type="date"] { color-scheme: dark; }
  input[type="date"]::-webkit-calendar-picker-indicator { filter:invert(1); opacity:.8; cursor:pointer; }

  .grid-2 { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:16px; }
  .control { background: rgba(255,255,255,0.06); border:1px solid rgba(255,255,255,0.15); border-radius:20px; padding:14px; }
  .control label { margin:0 0 10px; text-align:center; font-size:12px; }
  .stepper { display:flex; align-items:center; justify-content:space-between; background: rgba(0,0,0,0.18); border-radius:14px; padding:4px; }
  .stepper button { width:48px; height:48px; min-height:48px; border-radius:10px; background: rgba(255,255,255,0.14); border:none; font-size:26px; font-weight:500; display:grid; place-items:center; cursor:pointer; }
  .stepper button:active { transform:scale(.94); background: rgba(255,255,255,0.22); }
  .stepper span { font-size:24px; font-weight:700; min-width:44px; text-align:center; }
  .selector { display:flex; align-items:center; justify-content:space-between; margin-top:10px; font-size:13px; opacity:.9; }
  .selector select { width:auto; min-height:36px; height:36px; padding:0 10px; border-radius:10px; background: rgba(0,0,0,0.25); font-size:14px; border:1px solid rgba(255,255,255,0.15); }

  .details-toggle {
    width:100%; min-height:56px; margin-top:4px; display:flex; align-items:center; justify-content:space-between;
    background: rgba(255,255,255,0.1); border:1px solid rgba(255,255,255,0.2); cursor:pointer; font-weight:600; font-size:16px;
  }
  .details-toggle:active { transform:scale(.99); }
  .badge { background: rgba(255,255,255,0.22); padding:6px 14px; border-radius:999px; font-size:14px; font-weight:700; }

  .result { background: rgba(0,0,0,0.22); border:1px solid rgba(255,255,255,0.14); border-radius:18px; margin-top:12px; overflow:hidden; max-height:300px; opacity:1; transition: all .3s ease; }
  .result.hidden { max-height:0; opacity:0; margin-top:0; border-width:0; }
  .result pre { margin:0; padding:18px; font-family:inherit; font-size:15px; line-height:1.7; white-space:pre-wrap; word-break:break-word; }

  .actions { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-top:20px; }
  .actions button {
    min-height:56px; border-radius:16px; font-weight:600; font-size:15px;
    background: rgba(255,255,255,0.14); border:1px solid rgba(255,255,255,0.22);
    -webkit-backdrop-filter: blur(12px); backdrop-filter: blur(12px);
    cursor:pointer; display:flex; align-items:center; justify-content:center; gap:8px;
  }
  .actions button:active { transform:scale(.97); background: rgba(255,255,255,0.22); }

  .favorites { margin-top:22px; padding-top:18px; border-top:1px solid rgba(255,255,255,0.12); }
  .favorites.hidden { display:none; }
  .favorites h3 { font-size:13px; text-transform:uppercase; letter-spacing:.6px; opacity:.8; margin:0 0 10px 4px; }
  .chips { display:flex; flex-wrap:wrap; gap:8px; }
  .chip {
    padding:10px 14px; min-height:42px; border-radius:999px; background: rgba(255,255,255,0.1);
    border:1px solid rgba(255,255,255,0.16); font-size:14px; cursor:pointer; transition:all .3s ease;
    max-width:100%; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  }
  .chip:active { transform:scale(.96); background: rgba(255,255,255,0.18); }

  footer.footer { display:flex; align-items:center; justify-content:space-between; margin-top:24px; padding-top:14px; border-top:1px solid rgba(255,255,255,0.1); font-size:13px; opacity:.85; gap:10px; flex-wrap:wrap; }
  .format-toggle { display:flex; background: rgba(0,0,0,0.2); border-radius:10px; padding:3px; border:1px solid rgba(255,255,255,0.12); }
  .format-toggle button { min-height:30px; padding:0 10px; font-size:12px; border:none; background:transparent; border-radius:7px; opacity:.7; }
  .format-toggle button.active { background: rgba(255,255,255,0.18); opacity:1; }

  #toast {
    position:fixed; left:50%; bottom:28px; transform:translateX(-50%) translateY(120px);
    background: rgba(20,20,30,0.9); -webkit-backdrop-filter: blur(16px); backdrop-filter: blur(16px);
    color:#fff; padding:14px 22px; border-radius:999px; font-weight:600; font-size:14px;
    border:1px solid rgba(255,255,255,0.18); box-shadow:0 10px 30px rgba(0,0,0,0.4);
    opacity:0; transition: all .3s ease; z-index:1000; white-space:nowrap;
  }
  #toast.show { transform:translateX(-50%) translateY(0); opacity:1; }

  @media (min-width:600px) { .actions { grid-template-columns:repeat(4,1fr); } .card { padding:28px; } }
  @media (min-width:768px) { .container { max-width:560px; } h1 { font-size:36px; } }
  @media (min-width:1280px) { .container { max-width:640px; } body { padding:32px; } .card { padding:36px; border-radius:32px; } }
  @media (min-width:1920px) { html { font-size:18px; } .container { max-width:720px; } }
</style>
</head>
<body>
<div class="bg"></div>

<div class="container">
  <main class="card">
    <header>
      <h1>Assinatura</h1>
      <p class="subtitle">Calculadora de vencimentos</p>
    </header>

    <div class="field">
      <label for="plano">Nome do Plano</label>
      <input id="plano" type="text" inputmode="text" placeholder="Ex: Netflix Premium" autocomplete="off" autocapitalize="words">
    </div>

    <div class="field">
      <label for="dataInicial">Data inicial</label>
      <input id="dataInicial" type="date">
    </div>

    <div class="grid-2">
      <div class="control">
        <label>MESES</label>
        <div class="stepper">
          <button type="button" id="mesesMinus" aria-label="Diminuir meses">−</button>
          <span id="mesesValue">0</span>
          <button type="button" id="mesesPlus" aria-label="Aumentar meses">+</button>
        </div>
        <div class="selector">
          <span>dias/mês</span>
          <select id="diasMes" aria-label="Dias por mês">
            <option>28</option><option>29</option><option selected>30</option><option>31</option>
          </select>
        </div>
      </div>

      <div class="control">
        <label>ANOS</label>
        <div class="stepper">
          <button type="button" id="anosMinus" aria-label="Diminuir anos">−</button>
          <span id="anosValue">0</span>
          <button type="button" id="anosPlus" aria-label="Aumentar anos">+</button>
        </div>
        <div class="selector">
          <span>dias/ano</span>
          <select id="diasAno" aria-label="Dias por ano">
            <option selected>365</option><option>366</option>
          </select>
        </div>
      </div>
    </div>

    <button id="toggleDetails" class="details-toggle" type="button">
      <span id="toggleLabel">Mostrar Total</span>
      <span class="badge" id="totalBadge">0 dias</span>
    </button>

    <div id="resultBox" class="result hidden">
      <pre id="resultText"></pre>
    </div>

    <div class="actions">
      <button id="btnCopiar" type="button">📋 Copiar</button>
      <button id="btnWhats" type="button">📤 WhatsApp</button>
      <button id="btnEmail" type="button">✉️ E-mail</button>
      <button id="btnSalvar" type="button">⭐ Salvar</button>
    </div>

    <div id="favoritesSection" class="favorites hidden">
      <h3>Favoritos</h3>
      <div id="favoritesList" class="chips"></div>
    </div>

    <footer class="footer">
      <span id="hoje"></span>
      <div class="format-toggle">
        <button data-format="DD/MM/AAAA" class="active" type="button">DD/MM/AAAA</button>
        <button data-format="MM/DD/AAAA" type="button">MM/DD/AAAA</button>
      </div>
    </footer>
  </main>
</div>

<div id="toast" role="status" aria-live="polite"></div>

<script>
(() => {
  const $ = id => document.getElementById(id);
  let meses = 0, anos = 0;
  let formato = localStorage.getItem('assinatura_formato') || 'DD/MM/AAAA';
  let expanded = false;

  const plano = $('plano');
  const dataInicial = $('dataInicial');
  const diasMes = $('diasMes');
  const diasAno = $('diasAno');
  const mesesValue = $('mesesValue');
  const anosValue = $('anosValue');
  const totalBadge = $('totalBadge');
  const resultBox = $('resultBox');
  const resultText = $('resultText');
  const toggleLabel = $('toggleLabel');

  function getToday() {
    const now = new Date();
    const y = now.getFullYear();
    const m = String(now.getMonth()+1).padStart(2,'0');
    const d = String(now.getDate()).padStart(2,'0');
    return `${y}-${m}-${d}`;
  }

  function fmt(date) {
    const dd = String(date.getDate()).padStart(2,'0');
    const mm = String(date.getMonth()+1).padStart(2,'0');
    const yyyy = date.getFullYear();
    return formato === 'DD/MM/AAAA' ? `${dd}/${mm}/${yyyy}` : `${mm}/${dd}/${yyyy}`;
  }

  function parseDate(str) {
    const [y,m,d] = str.split('-').map(Number);
    return new Date(y, m-1, d);
  }

  function updateSteppers() {
    mesesValue.textContent = meses;
    anosValue.textContent = anos;
  }

  function calc() {
    if(!dataInicial.value) return;
    const inicio = parseDate(dataInicial.value);
    const dMes = parseInt(diasMes.value, 10);
    const dAno = parseInt(diasAno.value, 10);
    const totalDias = anos * dAno + meses * dMes;

    const vencimento = new Date(inicio);
    vencimento.setDate(vencimento.getDate() + totalDias);

    totalBadge.textContent = `${totalDias} ${totalDias===1?'dia':'dias'}`;

    const nomePlano = plano.value.trim() || '—';
    const texto = `✅ Início: ${fmt(inicio)}
🗓 Vencimento: ${fmt(vencimento)}
⏳ Total de Dias: ${totalDias}
📦 Plano: ${nomePlano}
🤝 Muito obrigado`;

    resultText.textContent = texto;
    window._current = { texto, inicio, vencimento, totalDias, nomePlano };
  }

  function showToast(msg) {
    const t = $('toast');
    t.textContent = msg;
    t.classList.add('show');
    clearTimeout(window._toastTimer);
    window._toastTimer = setTimeout(()=>t.classList.remove('show'), 2200);
  }

  // Steppers
  $('mesesMinus').onclick = () => { meses = Math.max(0, meses-1); updateSteppers(); calc(); };
  $('mesesPlus').onclick = () => { meses = Math.min(120, meses+1); updateSteppers(); calc(); };
  $('anosMinus').onclick = () => { anos = Math.max(0, anos-1); updateSteppers(); calc(); };
  $('anosPlus').onclick = () => { anos = Math.min(10, anos+1); updateSteppers(); calc(); };

  // Inputs
  [plano, dataInicial, diasMes, diasAno].forEach(el => {
    el.addEventListener('input', calc);
    el.addEventListener('change', calc);
  });

  // Toggle
  $('toggleDetails').onclick = () => {
    expanded = !expanded;
    resultBox.classList.toggle('hidden', !expanded);
    toggleLabel.textContent = expanded ? 'Ocultar Detalhes' : 'Mostrar Total';
  };

  // Actions
  $('btnCopiar').onclick = async () => {
    try { await navigator.clipboard.writeText(window._current.texto); showToast('Copiado!'); }
    catch { showToast('Não foi possível copiar'); }
  };
  $('btnWhats').onclick = () => {
    window.open('https://wa.me/?text=' + encodeURIComponent(window._current.texto), '_blank');
  };
  $('btnEmail').onclick = () => {
    const subj = `Assinatura - ${window._current.nomePlano}`;
    location.href = `mailto:?subject=${encodeURIComponent(subj)}&body=${encodeURIComponent(window._current.texto)}`;
  };
  $('btnSalvar').onclick = () => {
    const favs = JSON.parse(localStorage.getItem('assinatura_favoritos') || '[]');
    const item = {
      id: Date.now(),
      plano: plano.value.trim(),
      dataInicial: dataInicial.value,
      meses, anos,
      diasMes: parseInt(diasMes.value),
      diasAno: parseInt(diasAno.value)
    };
    favs.unshift(item);
    if(favs.length > 20) favs.pop();
    localStorage.setItem('assinatura_favoritos', JSON.stringify(favs));
    renderFavs(); showToast('⭐ Salvo nos favoritos');
  };

  function renderFavs() {
    const favs = JSON.parse(localStorage.getItem('assinatura_favoritos') || '[]');
    const sec = $('favoritesSection');
    const list = $('favoritesList');
    list.innerHTML = '';
    if(!favs.length) { sec.classList.add('hidden'); return; }
    sec.classList.remove('hidden');
    favs.forEach(f => {
      const b = document.createElement('button');
      b.className = 'chip';
      b.type = 'button';
      const label = f.plano || 'Plano';
      const parts = [];
      if(f.anos) parts.push(`${f.anos}a`);
      if(f.meses) parts.push(`${f.meses}m`);
      b.textContent = `${label}${parts.length ? ' • ' + parts.join(' ') : ''}`;
      b.title = 'Toque para carregar';
      b.onclick = () => loadFav(f);
      list.appendChild(b);
    });
  }

  function loadFav(f) {
    plano.value = f.plano || '';
    dataInicial.value = f.dataInicial || getToday();
    meses = f.meses || 0;
    anos = f.anos || 0;
    diasMes.value = f.diasMes || 30;
    diasAno.value = f.diasAno || 365;
    updateSteppers(); calc(); showToast('Favorito carregado');
  }

  // Formato
  document.querySelectorAll('.format-toggle button').forEach(btn => {
    if(btn.dataset.format === formato) btn.classList.add('active');
    btn.onclick = () => {
      document.querySelectorAll('.format-toggle button').forEach(b=>b.classList.remove('active'));
      btn.classList.add('active');
      formato = btn.dataset.format;
      localStorage.setItem('assinatura_formato', formato);
      calc();
      updateHoje();
    };
  });

  function updateHoje() {
    const hoje = new Date();
    const fmtHoje = new Intl.DateTimeFormat('pt-BR', { weekday:'long', day:'2-digit', month:'2-digit', year:'numeric' }).format(hoje);
    $('hoje').textContent = `Hoje: ${fmtHoje.charAt(0).toUpperCase() + fmtHoje.slice(1)}`;
  }

  // Init
  dataInicial.value = getToday();
  updateSteppers();
  updateHoje();
  renderFavs();
  calc();

  // Double tap stepper for fast change
  let tapTimer = null;
  [ $('mesesPlus'), $('anosPlus') ].forEach(btn => {
    btn.addEventListener('dblclick', () => {
      if(btn.id.includes('meses')) { meses = Math.min(120, meses+6); } else { anos = Math.min(10, anos+1); }
      updateSteppers(); calc();
    });
  });
})();
</script>
<script>(function(){document.addEventListener("click",function(e){var a=e.target.closest("[data-product-id]");if(!a)return;e.preventDefault();var pid=a.getAttribute("data-product-id");if(pid)parent.postMessage({type:"ecto-artifact-link-click",productId:pid},"*")})})();</script>
</body>
</html>
